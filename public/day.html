<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/first.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Arena — Day</title>
<link rel="stylesheet" href="/style.css">
<style>
:root{--orange:#FF9100;--green:#00C97A;--purple:#9B8AFF;--blue:#4FC3F7;}
.block-arrow{color:var(--cyan);margin-left:8px;font-size:11px;font-weight:500;}
.block-name{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-left:4px;}

.activity-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--card-border);}
.activity-row:last-child{border-bottom:none;}
.act-mins{font-size:13px;font-weight:700;color:var(--teal);min-width:48px;text-align:right;padding-top:2px;flex-shrink:0;}
.act-name{font-size:15px;font-weight:700;color:var(--white);}
.act-desc{font-size:13px;color:var(--slate);line-height:1.55;margin-top:6px;}
.act-link{display:inline-block;font-size:13px;font-weight:700;color:var(--cyan);text-decoration:none;margin-top:6px;transition:opacity .15s;}
.act-link:hover{opacity:.75;}

.ends-box{background:var(--navy);border-radius:12px;padding:22px 24px;margin-top:28px;}
.ends-label{font-size:12px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.ends-prompt{font-size:16px;color:var(--white);line-height:1.65;font-style:italic;}


.day-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:20px;border-top:1px solid var(--card-border);}
.day-nav a{font-size:14px;font-weight:700;color:var(--teal);text-decoration:none;padding:10px 16px;border:1.5px solid var(--teal);border-radius:8px;transition:background .15s,color .15s;}
.day-nav a:hover{background:var(--teal);color:var(--white);}
.day-nav a.disabled{opacity:.3;pointer-events:none;}

.week-strip-sm{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:24px;}
.day-pip{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:7px;padding:8px 4px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:border-color .15s;}
.day-pip:hover{border-color:var(--teal);}
.day-pip.current{border-color:var(--teal);background:var(--navy3);}
.day-pip.done{opacity:.45;}
.pip-num{font-size:15px;font-weight:800;color:var(--white);}
.day-pip.current .pip-num{color:var(--teal);}
.pip-day{font-size:10px;color:var(--text-muted);font-weight:500;margin-top:2px;}

.day-hero{background:var(--navy);border-left:6px solid var(--cyan);border-radius:0 12px 12px 0;padding:22px 26px;margin-bottom:24px;}
.hero-meta{font-size:13px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.hero-theme{font-size:24px;font-weight:800;color:var(--white);line-height:1.25;}
.hero-week{font-size:15px;color:var(--slate);margin-top:6px;}
</style>
</head>
<body>
<div id="site-header"></div>

<main class="page-body" id="main-content">
  <div id="loading" style="padding:40px;text-align:center;color:var(--text-muted);font-size:16px;">Loading...</div>
</main>

<script src="/config.js"></script>
<script src="/site.js"></script>
<script src="/days.js"></script>
<script src="/lessons.js"></script>
<script>
renderHeader('schedule');

const campDates = buildCampDates();
const params = new URLSearchParams(window.location.search);
const dayNum = parseInt(params.get('day')) || 1;
const day = DAYS.find(d => d.day === dayNum);

function blockColor(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'var(--orange)';
  if (b.includes('challenge')) return 'var(--green)';
  if (b.includes('match')) return 'var(--purple)';
  if (b.includes('open lab') || b.includes('open-lab')) return 'var(--blue)';
  if (b.includes('ends')) return 'var(--cyan)';
  return 'var(--slate)';
}

function blockLabel(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'Hook';
  if (b.includes('challenge')) return 'Challenge';
  if (b.includes('match')) return 'Match-Build-Make';
  if (b.includes('open lab') || b.includes('open-lab')) return 'Open Lab';
  if (b.includes('ends')) return 'ENDS';
  return block || 'Activity';
}

if (!day) {
  document.getElementById('main-content').innerHTML =
    '<p style="padding:40px;color:var(--text-muted);">Day not found.</p>';
} else {
  document.title = `Velocity Arena — Day ${day.day}: ${day.theme}`;

  // Week strip — show the 5 days of that week
  const weekStart = (day.week - 1) * 5 + 1;
  const weekDays = DAYS.filter(d => d.week === day.week);
  const weekPips = weekDays.map(d => {
    const isCurrent = d.day === dayNum;
    const isDone = d.day < dayNum;
    return `<a href="/day.html?day=${d.day}" class="day-pip${isCurrent ? ' current' : ''}${isDone ? ' done' : ''}">
      <div class="pip-num">${d.day}</div>
      <div class="pip-day">${campDayWeekday(campDates, d.day).slice(0,3)}</div>
    </a>`;
  }).join('');

  // Activities. getLessonLinks() comes from /lessons.js (shared with index.html).
  // The legacy `a.link` field (set directly on activities in days.js) takes
  // precedence as a single link; otherwise we fall back to the shared map,
  // which may return multiple links per activity.
  const actRows = (day.activities || []).map(a => {
    const links = a.link
      ? [{ url: a.link, label: 'Open Activity' }]
      : getLessonLinks(a.name).map(l => ({ url: l.url, label: l.label || 'Open Activity' }));
    const linksHtml = links.map(l =>
      `<a class="act-link" href="${l.url}">${l.label} &rarr;</a>`
    ).join(' ');
    return `<div class="activity-row">
      <div class="act-mins">${a.mins}m</div>
      <div>
        <span class="act-name">${a.name}</span>
        <span class="block-arrow">→</span><strong class="block-name" style="color:${blockColor(a.block)};">${blockLabel(a.block)}</strong>
        ${a.description ? `<div class="act-desc">${a.description}</div>` : ''}
        ${linksHtml}
      </div>
    </div>`;
  }).join('');

  // ENDS
  const endsHtml = day.ends ? `
    <div class="ends-box">
      <div class="ends-label">ENDS closing ritual</div>
      <div class="ends-prompt">${day.ends}</div>
    </div>` : '';

  // Prev / next
  const prevDay = dayNum > 1 ? dayNum - 1 : null;
  const nextDay = dayNum < 20 ? dayNum + 1 : null;

  // Build the dynamic daily schedule from this day's actual activities.
  // Start at 10:00, walk through each activity, accumulate minutes,
  // and prepend a 5-min Arrival check-in / append the ENDS ritual.
  function fmtTime(totalMins) {
    let h = Math.floor(totalMins / 60);
    const m = totalMins % 60;
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  const scheduleRows = [];
  let cursor = 10 * 60; // 10:00 AM in minutes
  scheduleRows.push({ time: cursor, label: 'Arrival + Team Check-in', mins: 5 });
  cursor += 5;
  (day.activities || []).forEach(a => {
    scheduleRows.push({ time: cursor, label: a.name, mins: a.mins || 0 });
    cursor += (a.mins || 0);
  });
  const endBuffer = day.endBufferMins || 0;
  if (endBuffer > 0) {
    scheduleRows.push({ time: cursor, label: 'Transitions / short breaks', mins: endBuffer });
    cursor += endBuffer;
  }
  const endsMins = (typeof day.endsMins === 'number') ? day.endsMins : 15;
  scheduleRows.push({ time: cursor, label: 'ENDS Closing Ritual', mins: endsMins });
  cursor += endsMins;
  scheduleRows.push({ time: cursor, label: 'Program Ends', mins: 0 });

  const dailyScheduleHtml = scheduleRows.map(r => `
    <div><strong style="color:var(--teal);min-width:70px;display:inline-block;">${fmtTime(r.time)}</strong> ${r.label}${r.mins ? ` <span style="color:var(--text-muted);">(${r.mins} min)</span>` : ''}</div>
  `).join('');

  document.getElementById('main-content').innerHTML = `

    <div style="margin-bottom:20px;">
      <div class="section-label">Week ${day.week} · ${day.weekName}</div>
      <div class="week-strip-sm">${weekPips}</div>
    </div>

    <div class="day-hero">
      <div class="hero-meta">Day ${day.day} · ${campDayWeekday(campDates, day.day)}</div>
      <div class="hero-theme">${day.theme}</div>
      <div class="hero-week">Week ${day.week}: ${day.weekName}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">

      <div>
        <div class="section-label">Today's activities</div>
        <div class="card" style="padding:6px 22px;">
          ${actRows || '<p style="padding:14px 0;color:var(--text-muted);font-size:15px;">No activities extracted for this day.</p>'}
        </div>
        ${endsHtml}
      </div>

      <div>
        <div class="section-label">Daily schedule</div>
        <div class="card" style="margin-top:0;">
          <div style="display:flex;flex-direction:column;gap:4px;font-size:14px;color:var(--text-muted);line-height:1.8;">
            ${dailyScheduleHtml}
          </div>
        </div>
      </div>

    </div>

    <div class="day-nav">
      <a href="${prevDay ? `/day.html?day=${prevDay}` : '#'}" class="${prevDay ? '' : 'disabled'}">
        ← Day ${prevDay || 1}
      </a>
      <span style="font-size:14px;color:var(--text-muted);">Day ${day.day} of 20</span>
      <a href="${nextDay ? `/day.html?day=${nextDay}` : '#'}" class="${nextDay ? '' : 'disabled'}">
        Day ${nextDay || 20} →
      </a>
    </div>
  `;
}
</script>
</body>
</html>
