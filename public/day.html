<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/first.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Arena — Day</title>
<link rel="stylesheet" href="/styles/va-tokens.css">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { margin: 0; padding: 0; }
body{
  background:var(--bg-1);color:var(--fg-0);
  font-family:var(--font-sans);font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:var(--accent-ink);}

/* Per-block accent colors */
:root{
  --block-hook:#FFA557;
  --block-challenge:#3DDC97;
  --block-match:#B388FF;
  --block-openlab:#4FC3F7;
  --block-ends:var(--accent);
}

/* ── topnav ─────────────────────────────────────────────────── */
.topnav{position:sticky;top:0;z-index:10;background:var(--bg-0);border-bottom:1px solid var(--line-strong);padding:14px 32px 0;}
.topnav .row{display:flex;align-items:center;gap:28px;max-width:1400px;margin:0 auto;}
.topnav .brand{font:800 13px/1 var(--font-sans);letter-spacing:.04em;color:var(--fg-0);display:flex;align-items:center;gap:8px;text-decoration:none;}
.topnav .brand .mark{width:18px;height:18px;background:var(--accent);display:inline-block;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);}
.topnav nav{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
.topnav nav a{font:600 11.5px/1 var(--font-sans);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-2);padding:14px;text-decoration:none;position:relative;white-space:nowrap;transition:color var(--dur-1) var(--ease-out);}
.topnav nav a:hover{color:var(--fg-0);}
.topnav nav a.active{color:var(--accent);}
.topnav nav a.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;background:var(--accent);}
.topnav nav a:focus-visible{outline:2px solid var(--accent);outline-offset:-4px;border-radius:2px;}
.topnav .util{font:600 11px/1 var(--font-mono);color:var(--fg-1);letter-spacing:.04em;padding-bottom:14px;font-variant-numeric:tabular-nums;}
.topnav .util b{color:var(--accent);}
.topnav .accent-rule{height:1px;background:var(--line-cyan);margin:0 -32px;}
@media (max-width:780px){.topnav nav{display:none;}}

/* ── page wrapper + head ────────────────────────────────────── */
.page{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
.section-label{font:600 11px/1 var(--font-sans);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-2);margin:0 0 12px;}
.section-label b{color:var(--accent);margin-right:8px;font-weight:600;}

/* ── week strip ─────────────────────────────────────────────── */
.week-strip-sm{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:24px;}
.day-pip{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:10px 6px;text-align:center;text-decoration:none;display:block;transition:border-color var(--dur-1) var(--ease-out),background var(--dur-1) var(--ease-out);}
.day-pip:hover{border-color:var(--line-cyan);background:var(--bg-3);}
.day-pip.current{border-color:var(--line-cyan);background:rgba(0,229,255,0.06);}
.day-pip.done{opacity:.45;}
.pip-num{font:500 16px/1 var(--font-mono);color:var(--fg-0);font-variant-numeric:tabular-nums;}
.day-pip.current .pip-num{color:var(--accent);}
.pip-day{font:500 10px/1 var(--font-mono);color:var(--fg-2);margin-top:4px;letter-spacing:.04em;}

/* ── day hero ───────────────────────────────────────────────── */
.day-hero{background:linear-gradient(180deg,rgba(0,229,255,0.06) 0%,var(--bg-2) 80%);border:1px solid var(--line-cyan);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:22px 26px;margin-bottom:28px;}
.hero-meta{font:600 11px/1 var(--font-sans);letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.hero-theme{font:800 26px/1.2 var(--font-sans);letter-spacing:-.01em;color:var(--fg-0);}
.hero-week{font:400 14px/1.5 var(--font-sans);color:var(--fg-1);margin-top:8px;}

/* ── two-column body ────────────────────────────────────────── */
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
@media (max-width:880px){.body-grid{grid-template-columns:1fr;}}

/* ── activity card + rows ───────────────────────────────────── */
.act-card{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:6px 22px;}
.activity-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);}
.activity-row:last-child{border-bottom:none;}
.act-mins{font:500 13px/1 var(--font-mono);color:var(--accent);min-width:46px;text-align:right;padding-top:2px;flex-shrink:0;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.act-name{font:700 14.5px/1.35 var(--font-sans);color:var(--fg-0);}
.block-arrow{color:var(--fg-3);margin-left:8px;font-size:11px;}
.block-name{font:700 10.5px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.16em;margin-left:4px;}
.act-desc{font:400 13px/1.55 var(--font-sans);color:var(--fg-1);margin-top:6px;}
.act-link{display:inline-block;font:600 11px/1 var(--font-sans);letter-spacing:.06em;text-transform:uppercase;color:var(--accent);text-decoration:none;margin-top:8px;margin-right:12px;transition:color var(--dur-1) var(--ease-out);}
.act-link:hover{color:var(--accent-bright);}

/* ── ENDS box ───────────────────────────────────────────────── */
.ends-box{background:var(--bg-2);border:1px solid var(--line-cyan);border-left:3px solid var(--accent);border-radius:var(--r-md);padding:20px 24px;margin-top:24px;}
.ends-label{font:600 10.5px/1 var(--font-sans);letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.ends-prompt{font:400 15px/1.65 var(--font-sans);color:var(--fg-0);font-style:italic;}

/* ── produce checklist ──────────────────────────────────────── */
.produce-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(61,220,151,0.12);color:var(--ok);font:600 10.5px/1 var(--font-sans);letter-spacing:.16em;text-transform:uppercase;padding:5px 12px;border-radius:999px;border:1px solid rgba(61,220,151,0.32);margin-bottom:12px;}
.produce-list{display:flex;flex-direction:column;gap:8px;}
.produce-item{display:flex;align-items:center;gap:12px;background:var(--bg-3);border:1px solid var(--line);border-radius:var(--r-md);padding:12px 16px;transition:border-color var(--dur-1) var(--ease-out);}
.produce-item input{appearance:none;-webkit-appearance:none;width:20px;height:20px;border:2px solid var(--fg-2);border-radius:4px;background:transparent;cursor:pointer;flex-shrink:0;position:relative;transition:border-color var(--dur-1) var(--ease-out),background var(--dur-1) var(--ease-out);}
.produce-item input:hover{border-color:var(--fg-0);}
.produce-item input:checked{background:var(--ok);border-color:var(--ok);}
.produce-item input:checked::after{content:'';position:absolute;left:5px;top:1px;width:6px;height:11px;border:solid var(--bg-1);border-width:0 2.5px 2.5px 0;transform:rotate(45deg);}
.produce-item label{font:400 13px/1.55 var(--font-sans);color:var(--fg-1);cursor:pointer;flex:1;}
.produce-item.done label{color:var(--fg-3);text-decoration:line-through;}
.produce-empty{font:400 13px/1.55 var(--font-sans);color:var(--fg-2);padding:6px 0;}

/* ── daily schedule list ────────────────────────────────────── */
.schedule-card{background:var(--bg-2);border:1px solid var(--line-strong);border-radius:var(--r-md);padding:18px 22px;}
.sched-row{display:flex;align-items:baseline;gap:12px;padding:6px 0;font:400 13px/1.55 var(--font-sans);color:var(--fg-1);}
.sched-row .time{font:500 12px/1 var(--font-mono);color:var(--accent);min-width:72px;letter-spacing:.04em;font-variant-numeric:tabular-nums;}
.sched-row .label{flex:1;}
.sched-row .mins{font:500 11px/1 var(--font-mono);color:var(--fg-3);font-variant-numeric:tabular-nums;}

/* ── prev / next nav ────────────────────────────────────────── */
.day-nav{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--line);}
.day-nav a{font:600 11px/1 var(--font-sans);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-1);text-decoration:none;padding:10px 16px;border:1px solid var(--line-strong);border-radius:var(--r-sm);transition:all var(--dur-1) var(--ease-out);}
.day-nav a:hover{color:var(--accent);border-color:var(--line-cyan);}
.day-nav a.disabled{opacity:.3;pointer-events:none;}
.day-nav .meta{font:500 12px/1 var(--font-mono);color:var(--fg-2);font-variant-numeric:tabular-nums;letter-spacing:.04em;}
</style>
</head>
<body>

<header class="topnav">
  <div class="row">
    <a class="brand" href="/"><span class="mark"></span> VELOCITY ARENA</a>
    <nav>
      <a href="/today.html">Today</a>
      <a href="/schedule.html" class="active">Schedule</a>
      <a href="/activities/dashboard/velocity-arena-dashboard.html">Dashboard</a>
      <a href="/activities/math/index.html">Math Concepts</a>
      <a href="/makecode.html">MakeCode</a>
      <a href="/tools.html">Tools</a>
      <a href="/teachers.html">Teacher Resources</a>
      <a href="/about.html">About</a>
    </nav>
    <span class="util" id="day-pill"></span>
  </div>
  <div class="accent-rule"></div>
</header>

<main class="page" id="main-content">
  <div id="loading" style="padding:40px;text-align:center;color:var(--fg-2);font-size:15px;">Loading…</div>
</main>

<script src="/config.js"></script>
<script src="/site.js"></script>
<script src="/days-default.js"></script>
<script src="/days-tn.js"></script>
<script src="/days.js"></script>
<script src="/lessons.js"></script>
<script>
const campDates = (typeof buildCampDates === 'function') ? buildCampDates() : [];
const params = new URLSearchParams(window.location.search);
const dayNum = parseInt(params.get('day')) || 1;
const day = DAYS.find(d => d.day === dayNum);

function blockColor(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'var(--block-hook)';
  if (b.includes('challenge')) return 'var(--block-challenge)';
  if (b.includes('match')) return 'var(--block-match)';
  if (b.includes('open lab') || b.includes('open-lab')) return 'var(--block-openlab)';
  if (b.includes('ends')) return 'var(--block-ends)';
  return 'var(--fg-2)';
}

function blockLabel(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook') || b.includes('ice breaker')) return 'Hook';
  if (b.includes('challenge')) return 'Challenge';
  if (b.includes('match')) return 'Match-Build-Make';
  if (b.includes('open lab') || b.includes('open-lab')) return 'Open Lab';
  if (b.includes('ends')) return 'ENDS';
  return block || 'Activity';
}

function fmtTime(totalMins) {
  let h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  const ampm = h >= 12 ? 'PM' : 'AM';
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}

if (!day) {
  document.getElementById('main-content').innerHTML =
    '<p style="padding:40px;color:var(--fg-2);">Day not found.</p>';
} else {
  document.title = `Velocity Arena — Day ${day.day}: ${day.theme}`;

  const weekDays = DAYS.filter(d => d.week === day.week);
  const weekPips = weekDays.map(d => {
    const isCurrent = d.day === dayNum;
    const isDone = d.day < dayNum;
    return `<a href="/day.html?day=${d.day}" class="day-pip${isCurrent ? ' current' : ''}${isDone ? ' done' : ''}">
      <div class="pip-num">${String(d.day).padStart(2,'0')}</div>
      <div class="pip-day">${(typeof campDayWeekday === 'function' && campDates.length ? campDayWeekday(campDates, d.day).slice(0,3) : '')}</div>
    </a>`;
  }).join('');

  const actRows = (day.activities || []).map(a => {
    const links = a.link
      ? [{ url: a.link, label: 'Open activity' }]
      : (typeof getLessonLinks === 'function' ? getLessonLinks(a.name) : []).map(l => ({ url: l.url, label: l.label || 'Open lesson' }));
    if (a.makecode) links.push({ url: a.makecode, label: 'MakeCode', newTab: true });
    const linksHtml = links.map(l =>
      `<a class="act-link" href="${l.url}"${l.newTab ? ' target="_blank"' : ''}>${l.label} →</a>`
    ).join('');
    return `<div class="activity-row">
      <div class="act-mins">${a.mins}m</div>
      <div style="flex:1;min-width:0;">
        <span class="act-name">${a.name}</span>
        <span class="block-arrow">·</span><span class="block-name" style="color:${blockColor(a.block)};">${blockLabel(a.block)}</span>
        ${a.description ? `<div class="act-desc">${a.description}</div>` : ''}
        ${linksHtml}
      </div>
    </div>`;
  }).join('');

  const endsHtml = day.ends ? `
    <div class="ends-box">
      <div class="ends-label">ENDS closing ritual</div>
      <div class="ends-prompt">${day.ends}</div>
    </div>` : '';

  const prevDay = dayNum > 1 ? dayNum - 1 : null;
  const nextDay = dayNum < 20 ? dayNum + 1 : null;

  // Build the dynamic daily schedule
  const scheduleRows = [];
  let cursor = 10 * 60;
  scheduleRows.push({ time: cursor, label: 'Arrival + Team Check-in', mins: 5 });
  cursor += 5;
  (day.activities || []).forEach(a => {
    scheduleRows.push({ time: cursor, label: a.name, mins: a.mins || 0 });
    cursor += (a.mins || 0);
  });
  const endBuffer = day.endBufferMins || 0;
  if (endBuffer > 0) {
    scheduleRows.push({ time: cursor, label: 'Transitions / short breaks', mins: endBuffer });
    cursor += endBuffer;
  }
  const endsMins = (typeof day.endsMins === 'number') ? day.endsMins : 15;
  scheduleRows.push({ time: cursor, label: 'ENDS Closing Ritual', mins: endsMins });
  cursor += endsMins;
  scheduleRows.push({ time: cursor, label: 'Program ends', mins: 0 });

  const dailyScheduleHtml = scheduleRows.map(r => `
    <div class="sched-row">
      <span class="time">${fmtTime(r.time)}</span>
      <span class="label">${r.label}</span>
      ${r.mins ? `<span class="mins">${r.mins}m</span>` : ''}
    </div>
  `).join('');

  // Produce checklist persisted per day in localStorage
  const produceKey = `va_produce_d${day.day}`;
  let produceDone = [];
  try { produceDone = JSON.parse(localStorage.getItem(produceKey) || '[]'); } catch(e){}
  const produceHtml = (day.produce && day.produce.length)
    ? `<div class="produce-list">${day.produce.map((p,i) => {
        const checked = produceDone.includes(i);
        return `<div class="produce-item${checked ? ' done' : ''}" id="pi-${i}">
          <input type="checkbox" id="pc-${i}"${checked ? ' checked' : ''} onchange="toggleProduce(${i},this)">
          <label for="pc-${i}">${p}</label>
        </div>`;
      }).join('')}</div>`
    : `<div class="produce-empty">Deliverables list coming soon for this day.</div>`;

  const weekdayLabel = (typeof campDayWeekday === 'function' && campDates.length)
    ? campDayWeekday(campDates, day.day) : '';

  document.getElementById('main-content').innerHTML = `

    <h2 class="section-label"><b>Week ${day.week}</b>${day.weekName || ''}</h2>
    <div class="week-strip-sm">${weekPips}</div>

    <div class="day-hero">
      <div class="hero-meta">Day ${String(day.day).padStart(2,'0')} · ${weekdayLabel}</div>
      <div class="hero-theme">${day.theme}</div>
      <div class="hero-week">Week ${day.week}: ${day.weekName || ''}</div>
    </div>

    <div class="body-grid">

      <div>
        <h2 class="section-label">Today's activities</h2>
        <div class="act-card">
          ${actRows || '<p style="padding:14px 0;color:var(--fg-2);">No activities recorded for this day.</p>'}
        </div>

        <div style="margin-top:24px;">
          <span class="produce-pill">What you produce</span>
          ${produceHtml}
        </div>

        ${endsHtml}
      </div>

      <div>
        <h2 class="section-label">Daily schedule</h2>
        <div class="schedule-card">
          ${dailyScheduleHtml}
        </div>
      </div>

    </div>

    <div class="day-nav">
      <a href="${prevDay ? `/day.html?day=${prevDay}` : '#'}" class="${prevDay ? '' : 'disabled'}">← Day ${prevDay || 1}</a>
      <span class="meta">DAY ${String(day.day).padStart(2,'0')} / 20</span>
      <a href="${nextDay ? `/day.html?day=${nextDay}` : '#'}" class="${nextDay ? '' : 'disabled'}">Day ${nextDay || 20} →</a>
    </div>
  `;
}

function toggleProduce(idx, el) {
  if (!day) return;
  const key = `va_produce_d${day.day}`;
  let done = [];
  try { done = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
  if (el.checked && !done.includes(idx)) done.push(idx);
  if (!el.checked) done = done.filter(i => i !== idx);
  try { localStorage.setItem(key, JSON.stringify(done)); } catch(e){}
  const item = document.getElementById('pi-' + idx);
  if (item) item.classList.toggle('done', el.checked);
}

// ── Day pill in topnav ───────────────────────────────────────
(function () {
  const el = document.getElementById('day-pill');
  if (!el) return;
  let dayDisplay = day ? day.day : null;
  el.innerHTML = dayDisplay ? `STUDENT · DAY <b>${String(dayDisplay).padStart(2,'0')}</b> / 20` : 'STUDENT';
})();
</script>
</body>
</html>
