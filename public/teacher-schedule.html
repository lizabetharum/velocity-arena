<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity Arena · Facilitator Reference Card</title>
  <link rel="icon" href="/images/first.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0D0D1A;
      --surface:   #161A2E;
      --surface-2: #1C2140;
      --cyan:      #00E5FF;
      --cyan-dim:  rgba(0,229,255,0.10);
      --orange:    #FF8A50;
      --teal:      #00BFA5;
      --green:     #66BB6A;
      --yellow:    #FFD54F;
      --purple:    #BB88FF;
      --red:       #FF6B6B;
      --text:      #E8E8F0;
      --text-mute: #8B8FA8;
      --text-fnt:  #5A5E78;
      --border:    rgba(255,255,255,0.06);
      --r-md:      10px;
      --r-sm:      6px;
    }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      min-height: 100dvh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5; font-size: 16px;
      padding-bottom: 4rem;
    }

    /* ── Password gate ───────────────────────────────────────── */
    .gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .gate-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 2.25rem 2rem; width: 100%; max-width: 22rem; text-align: center; }
    .gate-icon { width: 3rem; height: 3rem; background: var(--surface-2); border: 1.5px solid rgba(0,229,255,.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .gate-title { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.375rem; }
    .gate-sub { font-size: 0.875rem; color: var(--text-mute); margin-bottom: 1.5rem; line-height: 1.5; }
    .gate-input { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); text-align: center; letter-spacing: 0.1em; outline: none; transition: border-color 0.15s; margin-bottom: 0.75rem; }
    .gate-input:focus { border-color: var(--cyan); }
    .gate-input::placeholder { color: var(--text-fnt); letter-spacing: 0; }
    .gate-btn { width: 100%; background: var(--cyan); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 0.9375rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.875rem; border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.15s; }
    .gate-btn:hover { opacity: 0.88; }
    .gate-error { font-size: 0.8125rem; color: var(--red); margin-top: 0.625rem; min-height: 1.2em; }
    .page { display: none; }
    .page.unlocked { display: block; }

    /* ── Sticky top bar with day selector ────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,26,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .topbar-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .brand { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--cyan); white-space: nowrap; }
    .brand span { font-weight: 400; color: var(--text-mute); margin-left: 6px; }
    .back-link { font-size: 12px; color: var(--text-mute); text-decoration: none; }
    .back-link:hover { color: var(--cyan); }
    .day-pills { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; justify-content: center; }
    .day-pill {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--text-fnt);
      background: transparent; color: var(--text-mute);
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 120ms ease;
    }
    .day-pill:hover { border-color: var(--cyan); color: var(--text); }
    .day-pill.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 700; }
    .day-pill.today { box-shadow: 0 0 0 2px rgba(0,229,255,0.25); }
    .week-gap { width: 4px; height: 28px; display: flex; align-items: center; justify-content: center; }
    .week-gap::after { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--text-fnt); }

    /* ── Page card (the printable lesson card) ───────────────── */
    .card-wrap {
      max-width: 1100px; margin: 24px auto; padding: 0 16px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px;
      background: var(--surface-2); border-bottom: 3px solid var(--cyan);
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .card-week  { color: var(--cyan); }
    .card-wkday { color: var(--text-mute); }
    .card-body  { padding: 22px 28px 24px; }

    .day-line {
      display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .day-num { font-size: 2.625rem; font-weight: 800; color: #fff; line-height: 1; }
    .day-theme { font-size: 0.9375rem; font-style: italic; color: var(--text-mute); line-height: 1.4; }

    /* Big Math Idea + Vocabulary boxes */
    .accent-box {
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 10px 14px; margin-bottom: 8px;
      background: rgba(0,229,255,0.04);
      border-left: 4px solid var(--cyan);
    }
    .accent-box.vocab { border-left-color: var(--purple); background: rgba(187,136,255,0.05); }
    .accent-box .ab-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 4px; color: var(--cyan);
    }
    .accent-box.vocab .ab-label { color: var(--purple); }
    .accent-box .ab-content { font-size: 0.8125rem; color: var(--text); line-height: 1.5; }

    /* ── Schedule + Materials two-column section ─────────────── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-top: 18px;
    }
    @media (min-width: 880px) {
      .grid-2 { grid-template-columns: minmax(0, 2.2fr) minmax(220px, 1fr); }
    }

    .sched-table {
      width: 100%; border-collapse: collapse;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden;
    }
    .sched-table th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-mute); text-align: left;
      padding: 8px 10px; background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .sched-table td { font-size: 0.8125rem; padding: 10px 12px; vertical-align: top; line-height: 1.5; border-bottom: 1px solid var(--border); }
    .sched-table tr:last-child td { border-bottom: none; }
    .sched-table .col-block {
      width: 13rem; font-weight: 700; color: var(--text);
      border-left: 4px solid var(--text-fnt);
    }
    .sched-table .col-time { width: 7.25rem; font-size: 11px; color: var(--text-mute); white-space: nowrap; }
    .sched-table .col-time .t-dur { display: block; color: var(--text-fnt); font-size: 10px; margin-top: 2px; }
    .sched-row.hook       .col-block { border-left-color: var(--cyan); }
    .sched-row.challenge  .col-block { border-left-color: var(--cyan); }
    .sched-row.bridge     .col-block { border-left-color: var(--purple); }
    .sched-row.mbm        .col-block { border-left-color: var(--orange); }
    .sched-row.openlab    .col-block { border-left-color: var(--teal); }
    .sched-row.ends       .col-block { border-left-color: var(--green); }
    .sched-row.transition .col-block { border-left-color: var(--text-fnt); color: var(--text-mute); }
    .sched-title { font-weight: 600; color: var(--text); }
    .sched-desc  { color: var(--text-mute); margin-top: 4px; }
    .sched-links { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .sched-link {
      font-size: 10.5px; font-weight: 600;
      padding: 3px 8px; border-radius: 99px;
      background: var(--surface-2); color: var(--cyan);
      text-decoration: none; border: 1px solid rgba(0,229,255,0.3);
      display: inline-flex; align-items: center; gap: 3px;
      transition: opacity 120ms ease;
    }
    .sched-link:hover { opacity: 0.85; }
    .sched-link.worksheet { color: var(--teal); border-color: rgba(0,191,165,0.3); }
    .sched-link.webpage { color: var(--yellow); border-color: rgba(255,213,79,0.3); }
    .sched-link.template { color: var(--purple); border-color: rgba(187,136,255,0.3); }

    /* Materials sidebar */
    .sidebar {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 14px 16px;
      align-self: start;
    }
    .sidebar-title {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 10px;
    }
    .sidebar ul { list-style: none; padding: 0; margin: 0 0 10px; }
    .sidebar li {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 0; font-size: 0.8125rem; color: var(--text);
    }
    .sidebar li::before {
      content: "·"; color: var(--cyan); margin-right: 0; flex-shrink: 0; font-weight: 700;
    }
    .mat-check {
      width: 16px; height: 16px; border-radius: 3px; border: 1.5px solid var(--text-fnt);
      background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 3px;
      display: flex; align-items: center; justify-content: center; transition: all 120ms ease;
    }
    .mat-check.checked { background: var(--cyan); border-color: var(--cyan); }
    .mat-check.checked + .mat-label { color: var(--text-fnt); text-decoration: line-through; }
    .mat-check.checked::after { content: '✓'; font-size: 10px; font-weight: 700; color: var(--bg); line-height: 1; }
    .mat-label { font-size: 0.8125rem; line-height: 1.5; flex: 1; }
    .mat-li { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; }

    /* Key facilitation moves */
    .moves-card {
      background: rgba(0,229,255,0.04); border-left: 3px solid var(--cyan);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 14px 18px; margin-top: 18px;
    }
    .moves-card .mc-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 10px;
    }
    .moves-row {
      display: grid; grid-template-columns: 26px 1fr; gap: 12px;
      padding: 6px 0; align-items: start;
    }
    .moves-row + .moves-row { border-top: 1px solid var(--border); padding-top: 10px; }
    .moves-num {
      font-size: 13px; font-weight: 700; color: var(--cyan); padding-top: 1px;
    }
    .moves-text { font-size: 0.875rem; line-height: 1.5; color: var(--text); }

    /* ENDS / Exit Task */
    .ends-box {
      background: rgba(255,138,80,0.06);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--r-sm) var(--r-sm) 0;
      padding: 14px 18px; margin-top: 18px;
    }
    .ends-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--orange); margin-bottom: 4px; }
    .ends-content { font-size: 0.875rem; color: var(--text); line-height: 1.5; font-style: italic; }

    /* Quick Links — 3-up big icon cards */
    .quicklinks-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-mute); margin-top: 28px; margin-bottom: 12px;
    }
    .quicklinks {
      display: grid; grid-template-columns: 1fr; gap: 10px;
    }
    @media (min-width: 600px) { .quicklinks { grid-template-columns: 1fr 1fr 1fr; } }
    .qlink {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 22px 16px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: var(--r-md); text-decoration: none; color: var(--text);
      text-align: center; transition: border-color 120ms ease, background 120ms ease;
      cursor: pointer;
    }
    .qlink:hover { border-color: var(--cyan); background: rgba(0,229,255,0.05); }
    .qlink.disabled { opacity: 0.45; cursor: default; pointer-events: none; }
    .qlink-icon { width: 56px; height: 56px; filter: drop-shadow(0 0 14px rgba(0,229,255,0.25)); }
    .qlink-icon svg { width: 100%; height: 100%; display: block; }
    .qlink-title { font-size: 14px; font-weight: 700; }
    .qlink-sub { font-size: 11px; color: var(--text-fnt); font-weight: 400; min-height: 1.5em; }

    /* Footer */
    .card-footer {
      padding: 14px 28px; text-align: center;
      font-size: 11px; color: var(--text-fnt); letter-spacing: 0.04em;
      border-top: 1px solid var(--border); background: var(--surface-2);
    }

    .empty-note { font-size: 13px; color: var(--text-fnt); font-style: italic; padding: 8px 0; }
    .loading-note { font-size: 13px; color: var(--text-fnt); padding: 24px 0; text-align: center; }

    @media (min-width: 480px) { .day-pill { width: 30px; height: 30px; font-size: 13px; } }

    /* Print: hide navigation, expand card edges */
    @media print {
      body { background: #fff; color: #000; padding: 0; }
      .topbar, .quicklinks-label, .quicklinks { display: none; }
      .card { background: #fff; color: #000; border: none; }
      .card-header, .card-footer { background: none; color: #000; border-color: #444; }
      .accent-box, .moves-card, .ends-box, .sidebar, .sched-table { background: #fff; color: #000; border-color: #ccc; }
      .day-num { color: #000; }
      .sched-link { color: #00b8d4; }
    }
  </style>
</head>
<body>

<!-- Password gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="4" y="9" width="12" height="9" rx="2" stroke="#00E5FF" stroke-width="1.5"/>
        <path d="M7 9V6a3 3 0 016 0v3" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="gate-title">Facilitator Reference Card</div>
    <div class="gate-sub">This page is for facilitators only. Enter the password to continue.</div>
    <input class="gate-input" id="gate-input" type="password" placeholder="Enter password" autocomplete="off"/>
    <button class="gate-btn" id="gate-btn">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<div class="page" id="page">
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">VELOCITY ARENA <span>Summer Sparks 2026</span></div>
        <a href="/teachers.html" class="back-link">← Back to Teacher Resources</a>
      </div>
      <div class="day-pills" id="dayPills"></div>
    </div>
  </header>

  <div class="card-wrap" id="cardWrap">
    <div class="loading-note">Loading schedule…</div>
  </div>
</div>

<script src="/config.js"></script>
<script src="/site.js"></script>
<script src="/days.js"></script>
<script src="/lessons.js"></script>
<script>
// ══ Password gate ════════════════════════════════════════════════════
const PASSWORD    = (typeof CONFIG !== 'undefined' && CONFIG.teacherPassword) || '';
const SESSION_KEY = 'va_teacher_auth';
const gate = document.getElementById('gate');
const page = document.getElementById('page');
const gateInput = document.getElementById('gate-input');
const gateBtn   = document.getElementById('gate-btn');
const gateError = document.getElementById('gate-error');

function unlock() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') { gate.style.display='none'; page.classList.add('unlocked'); return; }
  if (gateInput.value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    gate.style.display = 'none'; page.classList.add('unlocked');
    init();
  } else {
    gateError.textContent = 'Incorrect password.';
    gateInput.value = ''; gateInput.focus();
    gateInput.style.borderColor = 'var(--red)';
    setTimeout(() => { gateInput.style.borderColor = ''; }, 1200);
  }
}
if (sessionStorage.getItem(SESSION_KEY) === '1') { gate.style.display = 'none'; page.classList.add('unlocked'); }
gateBtn.addEventListener('click', unlock);
gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// ══ Per-day teacher data: materials + facilitation moves ═════════════
const TEACHER_DAY_DATA = {
  1:  { materials: ['Stat cards (1/camper, Speed row only)', 'Speed Challenge worksheets', 'Micro:bit v2 + Cutebot Pro (1/team)', 'Coordinate grid (floor)'],
        moves: ["VOCAB: Say 'ratio' and 'unit rate' out loud when the formula is on the board — students need these words for the diagnostic", "Pre-Task Diagnostic: frame as 'not a test' — 'not yet' is valid", 'Speed Challenge: formula on board, ONE sentence, step back', "Peer comparison: do NOT arbitrate. Redirect to 'trace the work'"] },
  2:  { materials: ['Endurance Challenge worksheets', 'Graph paper for decay curves', 'Bot naming materials'],
        moves: ["VOCAB: Name 'rate of change' and 'linear decay' after jumping jacks — the body felt it, now name it", 'Gradual release: worked example → fill-in-blank → independent', "Redirect 'Is this right?' to the team comparison step", 'Bot naming: one sentence about what the bot is fighting for'] },

        moves: ["VOCAB: Name 'coordinate pair' and 'ordered pair' during grid walk — students are standing ON the concept", 'Record EVERY attempt: coordinate called, reached, error. No blanks.', 'Turning allocation has a physically visible consequence on the coordinate plane', 'Begin data dashboard entries today'] },
  4:  { materials: ['Power Challenge worksheets', 'Scoop materials (cardboard, tape, scissors, hot glue)', 'Cutebot Pros for push testing'],
        moves: ["VOCAB: Name 'proportional scaling' after the collision reveal — the non-linear surprise IS the vocabulary lesson", 'Scoop build: Coder/Fabricator/Analyst roles become meaningful', 'Let teams test and fail — best-looking scoop often pushes worst', "Do NOT reveal the budget constraint — that's Day 5"] },
  5:  { materials: ['Trade-off worksheets', 'Endurance Formula Test worksheets', 'Stat cards (all 4 rows active)', 'Data dashboard'],
        moves: ["VOCAB: Name 'variable' and 'constraint' — this is the Week 1 capstone vocabulary moment", 'Budget constraint is the DAY 5 REVEAL', "Equals sign: explicitly correct '=' as balance, not 'the answer is'", 'Loss Recovery Protocol: structured data response, not emotional spiral'] },
  6:  { materials: ['Interleaved Problem Set worksheets', 'Distance-Time Data Cards', 'Hot glue guns', 'MakeCode', 'Coordinate tracking sheets'],
        moves: ['Interleaved practice: identify which formula, not just compute', 'Scoop lockdown: hot glue means FINAL', 'NEW: Every bot drive now records start (x₁,y₁) and end (x₂,y₂) coordinates', 'This coordinate tracking becomes the data source for Week 2 analysis'] },
  7:  { materials: ['Match schedule (round-robin)', 'Match log sheets', 'Coordinate path recording sheets', 'Leaderboard (large, visible)', 'Data dashboards', 'Rivalry Cards'],
        moves: ['Matches create REAL coordinate data — every path recorded as (x,y) pairs', 'Leaderboard goes public — creates stakes', "Coordinate traces: students see their bot's journey AS ordered pairs", 'Loss Recovery Protocol: data response, not emotional spiral'] },
  8:  { materials: ['Matching card sets (situations, tables, graphs)', 'Scatter plot worksheets', 'Graph paper', 'Rulers/straight edges'],
        moves: ['Build scatter plot LIVE on the coordinate plane — the collective reveal is the moment', "Name slope as 'rate of change' — the steeper the line, the faster wins increase per Speed point", "Arc approximation: in Open Lab Track B, teams count how many straight coordinate segments approximate their bot's curved turn", 'Teams who skip data check will see it in Day 9 accuracy'] },
  9:  { materials: ['Envelopes (1/team)', 'Linear equation worksheets', 'Data dashboards (for swap)'],
        moves: ['Slope = rise/run between two COORDINATE points from THEIR data', 'Residuals: positive = over-predicted, negative = under-predicted', "Data Swap: verify ANOTHER team's slope calculation — builds accountability", "Sealed envelopes can't be changed — measures model quality, not hindsight"] },
  10: { materials: ['Distance Formula worksheets', 'Floor coordinate grid for verification', 'Season 1 final match schedule', 'Leaderboard'],
        moves: ['Distance formula uses THEIR OWN coordinate pairs from match data, not abstract points', 'Grid Check: physically walk to both coordinates, count the diagonal — verify calculation', 'Season 1 closes TODAY — final leaderboard + complete coordinate dataset create Week 3 stakes', "Season 2 hypothesis: 'What would you change and why?' with coordinate data as evidence"] },
  11: { materials: ['Decay Curve Analysis worksheets', 'Commissioner Proposal worksheets', 'Season 1 dashboards + decay data', 'Graph paper'],
        moves: ['HIGHEST-AGENCY week — campers run the rules committee', 'Slope IS rate of change: steeper decay curve = faster power loss = team disadvantage', 'Proposals must cite: specific decay rate + slope value + effect on last-place team', 'Season 2 reallocation is BINDING — test before committing'] },
  12: { materials: ['Proposal Verification worksheets', "Commissioner's Meeting Rubric", 'Voting materials', 'Green/red cards', 'Decay rate comparison sheets'],
        moves: ['Green/red cards: now specifically listening for rate of change and slope values', "Verification: calculate whether your rule change benefits YOUR team's decay more than last-place", "Commissioner's Meeting: use rubric, formal scoring — arguments must cite slope/rate data", 'Rule changes take effect IMMEDIATELY — test the predicted decay change'] },
  13: { materials: ['Decay Prediction worksheets', 'Season 1 decay data + slope values', 'Season 2 match schedule', 'Graph paper for predicted vs. actual curves'],
        moves: ['The decay model uses Season 1 slopes — Season 2 tests if they hold under new rules', 'Residuals on decay predictions: predicted power at t=3 vs. actual power at t=3', "Some decay models will break when rules change — that's the learning", "The slope CHANGED because the rules changed — that's the insight"] },
  14: { materials: ['Percent Change worksheets', 'Decay data (both seasons)', 'Season 2 match schedule'],
        moves: ['Percent change on SLOPES: the rate of change itself changed — how much?', 'A slope going from -5 to -3 is a 40% improvement in decay rate', "Cross-season comparison shows whether the Commissioner's rule change worked", 'This is the most sophisticated math move: measuring the change in a rate of change'] },
  15: { materials: ['Scouting Report templates (Sections 1–2)', "All teams' public dashboards + decay data", 'Index cards for weakness claims'],
        moves: ['Scouting now includes decay curve analysis AND coordinate path data', 'Public dashboards: transparency by design', 'Scouting begins now for depth before Championship Day 18', 'Sealed weakness cards reopen on Championship Day'] },

const WEEK_NAMES = {
  1: 'Week 1 · Play Lab + Boot Camp',
  2: 'Week 2 · Season 1',
  3: 'Week 3 · Season 2 + Commissioner',
  4: 'Week 4 · Championship + Exhibition',
};
const WEEKDAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

function blockTypeClass(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook')) return 'hook';
  if (b.includes('challenge')) return 'challenge';
  if (b.includes('bridge')) return 'bridge';
  if (b.includes('match-build') || b.includes('match build')) return 'mbm';
  if (b.includes('open lab')) return 'openlab';
  if (b.includes('ends')) return 'ends';
  if (b.includes('transition')) return 'transition';
  return 'transition';
}

// ══ Schedule data (parsed from /teacher-schedule-data.md) ═══════════
let SCHEDULE = [];

async function loadSchedule() {
  try {
    const res = await fetch('/teacher-schedule-data.md', { cache: 'no-cache' });
    if (!res.ok) throw new Error('schedule fetch ' + res.status);
    SCHEDULE = parseScheduleMarkdown(await res.text());
    return true;
  } catch (e) {
    console.warn('Could not load schedule data:', e);
    SCHEDULE = [];
    return false;
  }
}

function parseScheduleMarkdown(text) {
  const rows = [];
  for (const raw of text.split('\n')) {
    const line = raw.trim();
    if (!line.startsWith('|')) continue;
    if (/^\|\s*-+\s*\|/.test(line)) continue;
    const cells = line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
    if (cells.length < 7) continue;
    const day = parseInt(cells[0], 10);
    if (!Number.isFinite(day) || day < 1 || day > 20) continue;
    rows.push({
      day, start: cells[1], end: cells[2], title: cells[3],
      duration: cells[4], block: cells[5], desc: cells[6],
      script: cells[7] || '', worksheet: cells[8] || '',
      webpage: cells[9] || '', template: cells[10] || '',
    });
  }
  return rows;
}

// ══ State ═══════════════════════════════════════════════════════════
let currentDay = 1;
let todayDay   = null;

function getTodayCampDay() {
  try {
    if (typeof buildCampDates !== 'function') return null;
    const dates = buildCampDates();
    const tz = (typeof CONFIG !== 'undefined' && CONFIG.timezone) || 'America/New_York';
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz });
    for (let i = 0; i < dates.length; i++) {
      if (dates[i].toISOString().slice(0, 10) === todayStr) return i + 1;
    }
  } catch (e) {}
  return null;
}

function getDefaultDay() {
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20) return hashDay;
  return todayDay || 1;
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function findLessonPagesForDay(activities) {
  if (typeof getLessonLinks !== 'function') return [];
  const seen = new Set();
  const out = [];
  for (const a of activities) {
    const links = getLessonLinks(a.title) || [];
    for (const l of links) {
      if (seen.has(l.url)) continue;
      seen.add(l.url);
      out.push({ title: a.title, url: l.url, label: l.label || 'Open' });
    }
  }
  return out;
}

// ══ Render ══════════════════════════════════════════════════════════
function buildDayPills() {
  const sel = document.getElementById('dayPills');
  sel.innerHTML = '';
  for (let i = 1; i <= 20; i++) {
    if (i === 6 || i === 11 || i === 16) {
      const gap = document.createElement('div'); gap.className = 'week-gap'; sel.appendChild(gap);
    }
    const btn = document.createElement('button');
    btn.className = 'day-pill'
      + (i === currentDay ? ' active' : '')
      + (i === todayDay && i !== currentDay ? ' today' : '');
    btn.textContent = i;
    btn.setAttribute('aria-label', `Day ${i}`);
    btn.addEventListener('click', () => selectDay(i));
    sel.appendChild(btn);
  }
}

function selectDay(d) {
  currentDay = d;
  history.replaceState(null, '', `#day-${d}`);
  buildDayPills();
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCard() {
  const day = (typeof DAYS !== 'undefined') ? DAYS.find(d => d.day === currentDay) : null;
  const wrap = document.getElementById('cardWrap');

  const week    = day ? (WEEK_NAMES[day.week] || `Week ${day.week}`) : '';
  const weekday = WEEKDAYS[(currentDay - 1) % 5];
  const teach   = TEACHER_DAY_DATA[currentDay] || { materials: [], moves: [] };
  const acts    = SCHEDULE.filter(s => s.day === currentDay);

  const matKey = `va-mat-${currentDay}`;
  let checked = {};
  try { checked = JSON.parse(localStorage.getItem(matKey)) || {}; } catch (e) {}

  // Pull ENDS line + first script of the day for quick links.
  const endsAct = acts.find(a => /ends/i.test(a.block || '')) || acts.slice().reverse().find(a => /ends/i.test(a.title || ''));
  const firstScript = (acts.find(a => a.script) || {}).script;

  let html = '';
  html += `<div class="card">
    <div class="card-header">
      <span class="card-week">${escapeHtml(week)}</span>
      <span class="card-wkday">${weekday}</span>
    </div>
    <div class="card-body">
      <div class="day-line">
        <span class="day-num">Day ${currentDay}</span>
        <span class="day-theme">${escapeHtml((day && day.theme) || '')}</span>
      </div>`;

  if (day && day.bigMathIdea) {
    html += `<div class="accent-box">
      <div class="ab-label">Big Math Idea</div>
      <div class="ab-content">${escapeHtml(day.bigMathIdea)}</div>
    </div>`;
  }
  if (day && day.vocabulary) {
    html += `<div class="accent-box vocab">
      <div class="ab-label">Vocabulary Moment</div>
      <div class="ab-content">${escapeHtml(day.vocabulary)}</div>
    </div>`;
  }

  // ── Schedule + Materials side-by-side ──
  html += `<div class="grid-2">`;

  // Schedule table
  html += `<div>
    <table class="sched-table">
      <thead>
        <tr><th>Block</th><th>Activity</th><th>Time</th></tr>
      </thead>
      <tbody>`;
  if (acts.length === 0) {
    html += `<tr><td colspan="3"><div class="empty-note">No schedule rows for Day ${currentDay} in teacher-schedule-data.md.</div></td></tr>`;
  } else {
    acts.forEach(a => {
      const cls = blockTypeClass(a.block);
      const links = [];
      if (a.script)    links.push(`<a class="sched-link"            href="${escapeHtml(a.script)}"    target="_blank" rel="noopener">📄 Script</a>`);
      if (a.worksheet) links.push(`<a class="sched-link worksheet"  href="${escapeHtml(a.worksheet)}" target="_blank" rel="noopener">📋 Worksheet</a>`);
      if (a.webpage)   links.push(`<a class="sched-link webpage"    href="${escapeHtml(a.webpage)}"   target="_blank" rel="noopener">🔗 Page</a>`);
      if (a.template)  links.push(`<a class="sched-link template"   href="${escapeHtml(a.template)}"  target="_blank" rel="noopener">📐 Template</a>`);
      html += `<tr class="sched-row ${cls}">
        <td class="col-block">${escapeHtml(a.block)}</td>
        <td>
          <div class="sched-title">${escapeHtml(a.title)}</div>
          ${a.desc ? `<div class="sched-desc">${escapeHtml(a.desc)}</div>` : ''}
          ${links.length ? `<div class="sched-links">${links.join('')}</div>` : ''}
        </td>
        <td class="col-time">${escapeHtml(a.start)}–${escapeHtml(a.end)}<span class="t-dur">${escapeHtml(a.duration)}</span></td>
      </tr>`;
    });
  }
  html += `</tbody></table></div>`;

  // Materials sidebar
  html += `<div class="sidebar">
    <div class="sidebar-title">Materials Needed</div>`;
  if (teach.materials && teach.materials.length) {
    teach.materials.forEach((m, i) => {
      const isChecked = !!checked[i];
      html += `<div class="mat-li">
        <div class="mat-check ${isChecked ? 'checked' : ''}" data-mat-idx="${i}" role="checkbox" aria-checked="${isChecked}" tabindex="0"></div>
        <div class="mat-label">${escapeHtml(m)}</div>
      </div>`;
    });
  } else {
    html += `<div class="empty-note">No materials list for this day.</div>`;
  }
  // Lesson pages link list (under materials, like the mockup's "Pre-Task Diagnostic →")
  const lessonPages = findLessonPagesForDay(acts);
  if (lessonPages.length) {
    html += `<div style="margin-top:10px; padding-top:10px; border-top: 1px solid var(--border);">`;
    lessonPages.forEach(p => {
      html += `<a class="sched-link" style="display:inline-flex; margin: 4px 4px 4px 0;" href="${escapeHtml(p.url)}">${escapeHtml(p.label)} →</a>`;
    });
    html += `</div>`;
  }
  html += `</div>`; // sidebar

  html += `</div>`; // grid-2

  // ── Key Facilitation Moves ──
  if (teach.moves && teach.moves.length) {
    html += `<div class="moves-card">
      <div class="mc-label">Key Facilitation Moves</div>`;
    teach.moves.forEach((m, i) => {
      html += `<div class="moves-row">
        <div class="moves-num">${i + 1}</div>
        <div class="moves-text">${escapeHtml(m)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── ENDS / Exit Task ──
  if (endsAct) {
    html += `<div class="ends-box">
      <div class="ends-label">ENDS / Exit Task (${escapeHtml(endsAct.start)}–${escapeHtml(endsAct.end)})</div>
      <div class="ends-content">${escapeHtml(endsAct.title)}${endsAct.desc ? ' — ' + escapeHtml(endsAct.desc) : ''}</div>
    </div>`;
  }

  // ── Quick Links ──
  html += `<div class="quicklinks-label">Quick Links</div>`;
  html += `<div class="quicklinks">`;
  // Full Script: link to first activity's script if available; otherwise disabled
  if (firstScript) {
    html += `<a class="qlink" href="${escapeHtml(firstScript)}" target="_blank" rel="noopener">
      <div class="qlink-icon">${ICON_SCRIPT}</div>
      <div class="qlink-title">Full Script</div>
      <div class="qlink-sub">First script of the day</div>
    </a>`;
  } else {
    html += `<div class="qlink disabled">
      <div class="qlink-icon">${ICON_SCRIPT}</div>
      <div class="qlink-title">Full Script</div>
      <div class="qlink-sub">No script for this day</div>
    </div>`;
  }
  // Student Day View — always available
  html += `<a class="qlink" href="/day.html?day=${currentDay}">
    <div class="qlink-icon">${ICON_STUDENT}</div>
    <div class="qlink-title">Student Day View</div>
    <div class="qlink-sub">What campers see · Day ${currentDay}</div>
  </a>`;
  // Lesson Card — printable card view
  html += `<a class="qlink" href="/teacher-cards.html#day-${currentDay}">
    <div class="qlink-icon">${ICON_CARD}</div>
    <div class="qlink-title">Lesson Card</div>
    <div class="qlink-sub">Printable Day ${currentDay} card</div>
  </a>`;
  html += `</div>`;

  html += `<div class="card-footer">Day ${currentDay} of 20 · Velocity Arena Facilitator Reference Cards · Summer Sparks 2026</div>`;
  html += `</div></div>`; // /card-body /card

  wrap.innerHTML = html;

  // Wire up materials checkboxes
  wrap.querySelectorAll('.mat-check').forEach(el => {
    function toggle() {
      const idx = parseInt(el.dataset.matIdx, 10);
      const isChecked = el.classList.toggle('checked');
      el.setAttribute('aria-checked', isChecked);
      const label = el.nextElementSibling;
      if (label) label.classList.toggle('checked-label', isChecked);
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(matKey)) || {}; } catch (e) {}
      if (isChecked) saved[idx] = true; else delete saved[idx];
      try { localStorage.setItem(matKey, JSON.stringify(saved)); } catch (e) {}
    }
    el.addEventListener('click', toggle);
    el.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
    });
  });
}

// ══ Init ═══════════════════════════════════════════════════════════
async function init() {
  todayDay   = getTodayCampDay();
  currentDay = getDefaultDay();
  buildDayPills();
  await loadSchedule();
  renderCard();
}

window.addEventListener('hashchange', () => {
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20 && hashDay !== currentDay) selectDay(hashDay);
});

if (sessionStorage.getItem(SESSION_KEY) === '1') init();
