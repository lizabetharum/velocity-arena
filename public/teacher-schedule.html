<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velocity Arena · Facilitator Dashboard</title>
  <link rel="icon" href="/images/first.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0D1A;
      --surface: #161A2E;
      --surface-2: #1C2140;
      --cyan: #00E5FF;
      --cyan-dim: rgba(0,229,255,0.15);
      --cyan-border: rgba(0,229,255,0.3);
      --orange: #FF8A50;
      --teal: #00BFA5;
      --teal-dim: rgba(0,191,165,0.15);
      --green: #66BB6A;
      --yellow: #FFD54F;
      --yellow-dim: rgba(255,213,79,0.15);
      --purple: #BB88FF;
      --red: #FF6B6B;
      --text: #E8E8F0;
      --text-muted: #8B8FA8;
      --text-faint: #5A5E78;
      --border: rgba(255,255,255,0.06);
      --radius: 10px;
      --radius-sm: 6px;
    }
    html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      min-height: 100dvh;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      font-size: 16px;
      padding-bottom: 4rem;
    }

    /* Password gate */
    .gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .gate-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 2.25rem 2rem; width: 100%; max-width: 22rem; text-align: center; }
    .gate-icon { width: 3rem; height: 3rem; background: var(--surface-2); border: 1.5px solid var(--cyan-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .gate-title { font-size: 1.125rem; font-weight: 700; color: var(--text); margin-bottom: 0.375rem; }
    .gate-sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; line-height: 1.5; }
    .gate-input { width: 100%; background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); text-align: center; letter-spacing: 0.1em; outline: none; transition: border-color 0.15s; margin-bottom: 0.75rem; }
    .gate-input:focus { border-color: var(--cyan); }
    .gate-input::placeholder { color: var(--text-faint); letter-spacing: 0; }
    .gate-btn { width: 100%; background: var(--cyan); color: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 0.9375rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 0.875rem; border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.15s; }
    .gate-btn:hover { opacity: 0.88; }
    .gate-error { font-size: 0.8125rem; color: var(--red); margin-top: 0.625rem; min-height: 1.2em; }
    .page-content { display: none; }
    .page-content.unlocked { display: block; }

    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,26,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
    }
    .header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 12px; }
    .logo { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; color: var(--cyan); }
    .logo span { font-weight: 400; color: var(--text-muted); margin-left: 6px; font-size: 13px; }
    .back-link { font-size: 12px; color: var(--text-muted); text-decoration: none; font-weight: 500; display: inline-block; margin-top: 2px; }
    .back-link:hover { color: var(--cyan); }
    .pilot-badge { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: var(--cyan); background: var(--cyan-dim); padding: 3px 8px; border-radius: 99px; text-transform: uppercase; align-self: center; }
    .day-selector { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .day-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--text-faint);
      background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 120ms ease;
    }
    .day-btn:hover { border-color: var(--cyan); color: var(--text); }
    .day-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 700; }
    .day-btn.today { box-shadow: 0 0 0 2px rgba(0,229,255,0.25); }
    .week-gap { width: 4px; height: 32px; display: flex; align-items: center; justify-content: center; }
    .week-gap::after { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--text-faint); }
    .main { max-width: 760px; margin: 0 auto; padding: 20px 16px; }

    .today-card { margin-bottom: 20px; }
    .week-badge { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--cyan); text-transform: uppercase; margin-bottom: 4px; }
    .day-number { font-size: clamp(2rem, 1.5rem + 2vw, 3rem); font-weight: 700; line-height: 1.1; color: #fff; margin-bottom: 2px; }
    .day-theme { font-size: clamp(1rem, 0.9rem + 0.5vw, 1.2rem); font-style: italic; color: var(--text-muted); line-height: 1.4; margin-bottom: 4px; max-width: 60ch; }
    .day-weekday { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-faint); text-transform: uppercase; }

    .info-box { border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px; }
    .info-box-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .info-box-content { font-size: 15px; line-height: 1.55; }
    .info-box.math { background: var(--cyan-dim); border-left: 3px solid var(--cyan); }
    .info-box.math .info-box-label { color: var(--cyan); }
    .info-box.vocab { background: var(--teal-dim); border-left: 3px solid var(--teal); }
    .info-box.vocab .info-box-label { color: var(--teal); }
    .info-box.note { background: var(--yellow-dim); border-left: 3px solid var(--yellow); }
    .info-box.note .info-box-label { color: var(--yellow); }
    .info-box.note .info-box-content { color: var(--text); }

    .section-title { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }

    .schedule { margin-bottom: 24px; }
    .schedule-item {
      display: grid; grid-template-columns: 78px 1fr; gap: 0; margin-bottom: 4px;
      border-radius: var(--radius-sm); background: var(--surface); overflow: hidden;
    }
    .schedule-time {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      padding: 12px 4px 10px 12px; line-height: 1.35;
    }
    .schedule-time .time-end { color: var(--text-faint); display: block; }
    .schedule-time .duration { color: var(--text-faint); font-size: 10px; font-weight: 500; margin-top: 4px; display: block; letter-spacing: 0.04em; text-transform: uppercase; }
    .schedule-body { padding: 10px 12px 10px 8px; border-left: 3px solid transparent; }
    .schedule-block { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 3px; }
    .schedule-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
    .schedule-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }
    .schedule-links { display: flex; gap: 6px; flex-wrap: wrap; }
    .schedule-link {
      font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
      padding: 4px 9px; border-radius: 99px;
      background: var(--surface-2); color: var(--cyan);
      text-decoration: none; border: 1px solid var(--cyan-border);
      display: inline-flex; align-items: center; gap: 4px;
      transition: all 120ms ease;
    }
    .schedule-link:hover { background: var(--cyan-dim); }
    .schedule-link.script { color: var(--cyan); border-color: var(--cyan-border); }
    .schedule-link.worksheet { color: var(--teal); border-color: rgba(0,191,165,0.3); }
    .schedule-link.webpage { color: var(--yellow); border-color: rgba(255,213,79,0.3); }
    .schedule-link.template { color: var(--purple); border-color: rgba(187,136,255,0.3); }

    /* Block-color borders on schedule items */
    .schedule-body.type-hook,      .schedule-body.type-challenge { border-left-color: var(--cyan); }
    .schedule-body.type-mbm                                       { border-left-color: var(--orange); }
    .schedule-body.type-openlab                                   { border-left-color: var(--teal); }
    .schedule-body.type-ends                                      { border-left-color: var(--green); }
    .schedule-body.type-transition                                { border-left-color: var(--text-faint); }
    .schedule-body.type-bridge                                    { border-left-color: var(--purple); }

    .moves { margin-bottom: 24px; }
    .move-card {

      background: var(--surface); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px;

    .move-text { font-size: 14px; line-height: 1.5; align-self: center; }

    .materials { margin-bottom: 24px; }
    .material-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .material-item:last-child { border-bottom: none; }
    .mat-check { width: 22px; height: 22px; border-radius: 4px; border: 2px solid var(--text-faint); background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 120ms ease; }
    .mat-check.checked { background: var(--cyan); border-color: var(--cyan); }
    .mat-check.checked::after { content: '✓'; font-size: 13px; font-weight: 700; color: var(--bg); }
    .mat-label { font-size: 14px; line-height: 1.5; }
    .mat-label.checked-label { color: var(--text-faint); text-decoration: line-through; }

    .lesson-pages { margin-bottom: 24px; }
    .lesson-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px;
    }
    .lesson-card-empty { font-size: 13px; color: var(--text-faint); font-style: italic; }
    .lesson-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      text-decoration: none; color: var(--text);
      transition: color 120ms ease;
    }
    .lesson-row:last-child { border-bottom: none; }
    .lesson-row:hover { color: var(--cyan); }
    .lesson-row-title { font-size: 14px; font-weight: 600; flex: 1; }
    .lesson-row-arrow { font-size: 14px; color: var(--cyan); }
    .lesson-row-tag { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; }

    .empty-note { font-size: 13px; color: var(--text-faint); font-style: italic; padding: 6px 0; }
    .loading-note { font-size: 13px; color: var(--text-faint); padding: 6px 0; text-align: center; }

    @media (min-width: 480px) {
      .day-btn { width: 34px; height: 34px; font-size: 14px; }
    }
    @media (min-width: 768px) {
      .main { padding: 28px 24px; }
    }
  </style>
</head>

// ══ Password gate ════════════════════════════════════════════════════
const PASSWORD    = (typeof CONFIG !== 'undefined' && CONFIG.teacherPassword) || '';
const SESSION_KEY = 'va_teacher_auth';
const gate        = document.getElementById('gate');
const content     = document.getElementById('page-content');
const gateInput   = document.getElementById('gate-input');
const gateBtn     = document.getElementById('gate-btn');
const gateError   = document.getElementById('gate-error');

function unlock() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    gate.style.display = 'none'; content.classList.add('unlocked'); return;
  }
  if (gateInput.value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    gate.style.display = 'none'; content.classList.add('unlocked');
    init();
  } else {
    gateError.textContent = 'Incorrect password.';
    gateInput.value = ''; gateInput.focus();
    gateInput.style.borderColor = 'var(--red)';
    setTimeout(() => { gateInput.style.borderColor = ''; }, 1200);
  }
}
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  gate.style.display = 'none'; content.classList.add('unlocked');
}
gateBtn.addEventListener('click', unlock);
gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

const WEEK_NAMES = {
  1: 'Week 1 · Play Lab + Boot Camp',
  2: 'Week 2 · Season 1',
  3: 'Week 3 · Season 2 + Commissioner',
  4: 'Week 4 · Championship + Exhibition',
};
const WEEKDAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

// Map block-type strings (from the markdown) to CSS classes used for the
// left-edge color stripe on each schedule card.
function blockTypeClass(block) {
  const b = (block || '').toLowerCase();
  if (b.includes('hook')) return 'hook';
  if (b.includes('challenge')) return 'challenge';
  if (b.includes('bridge')) return 'bridge';
  if (b.includes('match-build') || b.includes('match build')) return 'mbm';
  if (b.includes('open lab')) return 'openlab';
  if (b.includes('ends')) return 'ends';
  if (b.includes('transition')) return 'transition';
  return 'transition';
}

// ══ Schedule data (parsed from /teacher-schedule-data.md) ═══════════
let SCHEDULE = [];

async function loadSchedule() {
  try {
    const res = await fetch('/teacher-schedule-data.md', { cache: 'no-cache' });
    if (!res.ok) throw new Error('schedule fetch ' + res.status);
    const text = await res.text();
    SCHEDULE = parseScheduleMarkdown(text);
    return true;
  } catch (e) {
    console.warn('Could not load schedule data:', e);
    SCHEDULE = [];
    return false;
  }
}

function parseScheduleMarkdown(text) {
  const lines = text.split('\n');
  const rows = [];
  for (const raw of lines) {
    const line = raw.trim();
    // table data row: starts with "|", has at least 5 pipes, first cell is a number
    if (!line.startsWith('|')) continue;
    if (/^\|\s*-+\s*\|/.test(line)) continue; // separator row
    const cells = line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
    if (cells.length < 7) continue;
    const day = parseInt(cells[0], 10);
    if (!Number.isFinite(day) || day < 1 || day > 20) continue;
    rows.push({
      day,
      start: cells[1],
      end: cells[2],
      title: cells[3],
      duration: cells[4],
      block: cells[5],
      desc: cells[6],
      script: cells[7] || '',
      worksheet: cells[8] || '',
      webpage: cells[9] || '',
      template: cells[10] || '',
    });
  }
  return rows;
}

// ══ State + storage ═════════════════════════════════════════════════
let currentDay = 1;
let todayDay   = null;

function getTodayCampDay() {
  try {
    if (typeof buildCampDates !== 'function') return null;
    const dates = buildCampDates();
    const tz = (typeof CONFIG !== 'undefined' && CONFIG.timezone) || 'America/New_York';
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz });
    for (let i = 0; i < dates.length; i++) {
      if (dates[i].toISOString().slice(0, 10) === todayStr) return i + 1;
    }
  } catch (e) {}
  return null;
}

function getDefaultDay() {
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20) return hashDay;
  return todayDay || 1;
}

// ══ Render ══════════════════════════════════════════════════════════
function buildDaySelector() {
  const sel = document.getElementById('daySelector');
  sel.innerHTML = '';
  for (let i = 1; i <= 20; i++) {
    if (i === 6 || i === 11 || i === 16) {
      const gap = document.createElement('div');
      gap.className = 'week-gap';
      sel.appendChild(gap);
    }
    const btn = document.createElement('button');
    btn.className = 'day-btn'
      + (i === currentDay ? ' active' : '')
      + (i === todayDay && i !== currentDay ? ' today' : '');
    btn.textContent = i;
    btn.setAttribute('aria-label', `Day ${i}`);
    btn.addEventListener('click', () => selectDay(i));
    sel.appendChild(btn);
  }
}

function selectDay(d) {
  currentDay = d;
  history.replaceState(null, '', `#day-${d}`);
  buildDaySelector();
  renderDay();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Lookup local lesson pages (from lessons.js ACTIVITY_LESSONS) for any
// activities on this day that have a mapping. Returns [{title, url, label}, …].
function findLessonPagesForDay(activities) {
  if (typeof getLessonLinks !== 'function') return [];
  const seen = new Set();
  const out = [];
  for (const a of activities) {
    const links = getLessonLinks(a.title) || [];
    for (const l of links) {
      const key = l.url;
      if (seen.has(key)) continue;
      seen.add(key);
      out.push({ title: a.title, url: l.url, label: l.label || 'Open' });
    }
  }
  return out;
}

function renderDay() {
  const day = (typeof DAYS !== 'undefined') ? DAYS.find(d => d.day === currentDay) : null;
  const main = document.getElementById('mainContent');

  const week    = day ? (WEEK_NAMES[day.week] || `Week ${day.week}`) : '';
  const weekday = WEEKDAYS[(currentDay - 1) % 5];
  const teach   = TEACHER_DAY_DATA[currentDay] || { materials: [], moves: [] };
  const activities = SCHEDULE.filter(s => s.day === currentDay);

  const matKey = `va-mat-${currentDay}`;
  let checked = {};
  try { checked = JSON.parse(localStorage.getItem(matKey)) || {}; } catch(e) {}

  let html = '';
  html += `<div class="today-card">
    <div class="week-badge">${escapeHtml(week)}</div>
    <div class="day-number">Day ${currentDay}</div>
    <div class="day-theme">${escapeHtml((day && day.theme) || '')}</div>
    <div class="day-weekday">${weekday}</div>
  </div>`;

  if (day && day.bigMathIdea) {
    html += `<div class="info-box math">
      <div class="info-box-label">Big Math Idea</div>
      <div class="info-box-content">${escapeHtml(day.bigMathIdea)}</div>
    </div>`;
  }
  if (day && day.vocabulary) {
    html += `<div class="info-box vocab">
      <div class="info-box-label">Vocabulary</div>
      <div class="info-box-content">${escapeHtml(day.vocabulary)}</div>
    </div>`;
  }

  // Schedule
  html += `<div class="schedule"><div class="section-title">Today's Schedule</div>`;
  if (activities.length === 0) {
    html += `<div class="empty-note">No schedule rows for Day ${currentDay} in teacher-schedule-data.md.</div>`;
  } else {
    activities.forEach(a => {
      const cls = blockTypeClass(a.block);
      const links = [];
      if (a.script)    links.push(`<a class="schedule-link script"    href="${escapeHtml(a.script)}"    target="_blank" rel="noopener">📄 Script</a>`);
      if (a.worksheet) links.push(`<a class="schedule-link worksheet" href="${escapeHtml(a.worksheet)}" target="_blank" rel="noopener">📋 Worksheet</a>`);
      if (a.webpage)   links.push(`<a class="schedule-link webpage"   href="${escapeHtml(a.webpage)}"   target="_blank" rel="noopener">🔗 Page</a>`);
      if (a.template)  links.push(`<a class="schedule-link template"  href="${escapeHtml(a.template)}"  target="_blank" rel="noopener">📐 Template</a>`);

      html += `<div class="schedule-item">
        <div class="schedule-time">
          <span>${escapeHtml(a.start)}</span>
          <span class="time-end">${escapeHtml(a.end)}</span>
          <span class="duration">${escapeHtml(a.duration)}</span>
        </div>
        <div class="schedule-body type-${cls}">
          <div class="schedule-block">${escapeHtml(a.block)}</div>
          <div class="schedule-title">${escapeHtml(a.title)}</div>
          ${a.desc ? `<div class="schedule-desc">${escapeHtml(a.desc)}</div>` : ''}
          ${links.length ? `<div class="schedule-links">${links.join('')}</div>` : ''}
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  // Facilitation moves
  if (teach.moves && teach.moves.length) {
    html += `<div class="moves"><div class="section-title">Key Facilitation Moves</div>`;
    teach.moves.forEach((m, i) => {
      html += `<div class="move-card">
        <div class="move-num">${i + 1}</div>
        <div class="move-text">${escapeHtml(m)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Materials checklist
  if (teach.materials && teach.materials.length) {
    html += `<div class="materials"><div class="section-title">Materials Checklist</div>`;
    teach.materials.forEach((m, i) => {
      const isChecked = !!checked[i];
      html += `<div class="material-item">
        <div class="mat-check ${isChecked ? 'checked' : ''}" data-mat-idx="${i}" role="checkbox" aria-checked="${isChecked}" tabindex="0"></div>
        <div class="mat-label ${isChecked ? 'checked-label' : ''}">${escapeHtml(m)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Lesson pages for the day. The first row is always the student day view
  // (an overview of what students see); subsequent rows are individual
  // lesson pages from ACTIVITY_LESSONS keyed off this day's activities.
  const lessonPages = findLessonPagesForDay(activities);
  html += `<div class="lesson-pages"><div class="section-title">Lesson Pages</div>`;
  html += `<div class="lesson-card">`;
  html += `<a class="lesson-row" href="/day.html?day=${currentDay}">
    <div>
      <div class="lesson-row-title">Student Day View</div>
      <div class="lesson-row-tag">What campers see · Day ${currentDay}</div>
    </div>
    <div style="flex:1"></div>
    <div class="lesson-row-arrow">→</div>
  </a>`;
  if (lessonPages.length === 0) {
    html += `<div class="lesson-card-empty" style="padding:10px 0 4px;">No interactive lesson pages mapped to today's activities.</div>`;
  } else {
    lessonPages.forEach(p => {
      html += `<a class="lesson-row" href="${escapeHtml(p.url)}">
        <div>
          <div class="lesson-row-title">${escapeHtml(p.title)}</div>
          <div class="lesson-row-tag">${escapeHtml(p.label)}</div>
        </div>
        <div style="flex:1"></div>
        <div class="lesson-row-arrow">→</div>
      </a>`;
    });
  }
  html += `</div>`;
  html += `</div>`;

  main.innerHTML = html;

  // Wire up materials checkboxes
  main.querySelectorAll('.mat-check').forEach(el => {
    function toggle() {
      const idx = parseInt(el.dataset.matIdx, 10);
      const isChecked = el.classList.toggle('checked');
      el.setAttribute('aria-checked', isChecked);
      const label = el.nextElementSibling;
      if (label) label.classList.toggle('checked-label', isChecked);
      let saved = {};
      try { saved = JSON.parse(localStorage.getItem(matKey)) || {}; } catch(e) {}
      if (isChecked) saved[idx] = true; else delete saved[idx];
      try { localStorage.setItem(matKey, JSON.stringify(saved)); } catch(e) {}
    }
    el.addEventListener('click', toggle);
    el.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
    });
  });
}

// ══ Init ════════════════════════════════════════════════════════════
async function init() {
  todayDay   = getTodayCampDay();
  currentDay = getDefaultDay();
  buildDaySelector();
  await loadSchedule();
  renderDay();
}

window.addEventListener('hashchange', () => {
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20 && hashDay !== currentDay) selectDay(hashDay);
});

if (sessionStorage.getItem(SESSION_KEY) === '1') init();
</script>
