<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/first.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Arena — Teacher Schedule</title>
<link rel="stylesheet" href="/style.css">
<style>
/* ── Password gate (unchanged) ──────────────────────────────── */
.gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100;}
.gate-box{background:var(--navy2);border:1.5px solid var(--border);border-radius:0.75rem;padding:2.5rem 2rem;width:100%;max-width:22rem;text-align:center;}
.gate-icon{width:3rem;height:3rem;background:var(--navy3);border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.gate-title{font-size:1.125rem;font-weight:800;color:var(--white);margin-bottom:0.375rem;}
.gate-sub{font-size:0.875rem;color:var(--slate);margin-bottom:1.5rem;line-height:1.5;}
.gate-input{width:100%;background:var(--navy3);border:1.5px solid var(--border);border-radius:0.5rem;padding:0.75rem 1rem;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--white);text-align:center;letter-spacing:.1em;outline:none;transition:border-color .15s;margin-bottom:0.75rem;}
.gate-input:focus{border-color:var(--cyan);}
.gate-input::placeholder{color:var(--slate);letter-spacing:0;}
.gate-btn{width:100%;background:var(--cyan);color:var(--navy);font-family:'DM Sans',sans-serif;font-size:0.9375rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:0.875rem;border-radius:0.5rem;border:none;cursor:pointer;transition:opacity .15s;}
.gate-btn:hover{opacity:.88;}
.gate-error{font-size:0.8125rem;color:#FF6B6B;margin-top:0.625rem;min-height:1.2em;}
.page-content{display:none;}
.page-content.unlocked{display:block;}

.back-link{font-size:0.875rem;font-weight:700;color:var(--cyan);text-decoration:none;display:inline-block;margin-bottom:1rem;}
.back-link:hover{text-decoration:underline;}

/* ── Day navigator strip ────────────────────────────────────── */
.nav-strip{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 0 1.25rem;
  border-bottom:1px solid var(--card-border);
  margin-bottom:1.75rem;
  flex-wrap:wrap;
}
.nav-brand{display:flex;align-items:baseline;gap:0.625rem;}
.nav-brand-name{font-size:0.8125rem;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:.08em;}
.nav-brand-sub{font-size:0.75rem;color:var(--slate);font-weight:500;}
.nav-pills{
  display:flex;align-items:center;gap:0.375rem;
  flex:1;flex-wrap:wrap;justify-content:center;
}
.nav-pill{
  display:flex;align-items:center;justify-content:center;
  width:2.125rem;height:2.125rem;
  border:1.5px solid var(--card-border);
  border-radius:50%;
  font-size:0.8125rem;font-weight:700;
  color:var(--slate);background:transparent;
  cursor:pointer;text-decoration:none;
  transition:all .15s;
  font-family:inherit;
}
.nav-pill:hover{border-color:var(--slate);color:var(--white);}
.nav-pill.active{background:var(--cyan);border-color:var(--cyan);color:var(--navy);}
.nav-pill-sep{width:0.3125rem;height:0.3125rem;border-radius:50%;background:var(--slate);opacity:.4;flex-shrink:0;}
.nav-badge{
  font-size:0.6875rem;font-weight:700;
  color:var(--cyan);border:1.5px solid var(--cyan);
  padding:0.25rem 0.75rem;border-radius:999px;
  text-transform:uppercase;letter-spacing:.08em;
}

/* ── Day header ─────────────────────────────────────────────── */
.day-header{margin-bottom:1.5rem;}
.day-week-label{
  font-size:0.75rem;font-weight:700;color:var(--cyan);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:0.5rem;
}
.day-number{font-size:1.625rem;font-weight:800;color:var(--white);line-height:1.1;margin-bottom:0.25rem;}
.day-theme{font-size:1rem;color:var(--slate);font-style:italic;line-height:1.35;margin-bottom:0.375rem;}
.day-weekday{font-size:0.75rem;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.1em;}

/* ── Big Math Idea + Vocabulary cards ───────────────────────── */
.idea-card{
  background:var(--navy2);border:1px solid var(--card-border);
  border-left:4px solid var(--cyan);
  border-radius:0.625rem;padding:1rem 1.25rem;
  margin-bottom:0.875rem;
}
.idea-card.vocab{border-left-color:#44CC88;}
.idea-label{
  font-size:0.75rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--cyan);
  margin-bottom:0.5rem;
}
.idea-card.vocab .idea-label{color:#44CC88;}
.idea-text{font-size:0.9375rem;color:var(--white);line-height:1.6;}

/* ── Today's schedule heading ───────────────────────────────── */
.schedule-label{
  font-size:0.8125rem;font-weight:700;color:var(--slate);
  text-transform:uppercase;letter-spacing:.1em;
  margin:1.5rem 0 0.875rem;
}

/* ── Activities + boxes (reused from prior version) ─────────── */
.tact-row{display:flex;align-items:flex-start;gap:0.875rem;padding:0.75rem 0;border-bottom:1px solid var(--card-border);}
.tact-row:last-child{border-bottom:none;}
.tact-mins{font-size:0.75rem;font-weight:700;color:var(--cyan);min-width:2.75rem;flex-shrink:0;padding-top:0.125rem;}
.tact-body{flex:1;}
.tact-name{font-size:0.9375rem;font-weight:700;color:var(--white);}
.tact-block{font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:0.125rem;color:var(--slate);}
.tact-desc{font-size:0.8125rem;color:var(--slate);line-height:1.55;margin-top:0.375rem;}
.tact-links{display:flex;gap:0.375rem;flex-wrap:wrap;margin-top:0.5rem;}
.tact-link{font-size:0.6875rem;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:99px;background:var(--navy3);color:var(--cyan);text-decoration:none;border:1px solid rgba(0,229,255,0.3);display:inline-flex;align-items:center;gap:3px;transition:opacity .12s;}
.tact-link:hover{opacity:.85;}
.tact-link.worksheet{color:#44CC88;border-color:rgba(68,204,136,0.3);}
.tact-link.webpage{color:#FFCA28;border-color:rgba(255,202,40,0.3);}
.tact-link.template{color:#A08EE0;border-color:rgba(160,142,224,0.3);}
.tact-link.makecode{color:#FF9F43;border-color:rgba(255,159,67,0.35);}

.tends-box{background:var(--navy2);border:1px solid var(--card-border);border-left:4px solid var(--cyan);border-radius:0.625rem;padding:1rem 1.25rem;margin-top:1.25rem;}
.tends-label{font-size:0.6875rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.1em;margin-bottom:0.375rem;}
.tends-text{font-size:0.8125rem;color:var(--white);line-height:1.6;font-style:italic;}

.trisk-box{background:var(--navy2);border:1px solid #FFCA28;border-radius:0.625rem;padding:1rem 1.25rem;margin-top:0.75rem;}
.trisk-label{font-size:0.6875rem;font-weight:700;color:#FFCA28;text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.375rem;}
.trisk-text{font-size:0.8125rem;color:var(--slate);line-height:1.55;margin-bottom:0.5rem;}
.trisk-say-label{font-size:0.625rem;font-weight:700;color:#D69A12;text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.25rem;}
.trisk-say{font-size:0.8125rem;color:var(--white);line-height:1.6;font-style:italic;padding-left:0.75rem;border-left:3px solid #FFCA28;}

.tfun-box{background:var(--navy2);border:1px solid #99E8F5;border-radius:0.625rem;padding:1rem 1.25rem;margin-top:0.75rem;}
.tfun-label{font-size:0.6875rem;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.375rem;}
.tfun-text{font-size:0.8125rem;color:var(--slate);line-height:1.55;}

.tlo-box{background:var(--navy2);border:1px solid #5B3EA6;border-radius:0.625rem;padding:1rem 1.25rem;margin-top:0.75rem;}
.tlo-label{font-size:0.6875rem;font-weight:700;color:#A08EE0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:0.375rem;}
.tlo-text{font-size:0.8125rem;color:var(--slate);line-height:1.55;}

/* ── Prev/Next footer ───────────────────────────────────────── */
.day-footer-nav{
  display:flex;justify-content:space-between;gap:1rem;
  margin-top:2rem;padding-top:1.5rem;
  border-top:1px solid var(--card-border);
}
.day-footer-nav a{
  font-size:0.8125rem;font-weight:700;color:var(--cyan);
  text-decoration:none;
}
.day-footer-nav a:hover{text-decoration:underline;}
.day-footer-nav a.disabled{color:var(--slate);opacity:.4;pointer-events:none;}

@media(max-width:40rem){
  .nav-strip{flex-direction:column;align-items:stretch;gap:0.75rem;}
  .nav-pills{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding-bottom:0.25rem;}
  .nav-pill{flex-shrink:0;}
}
</style>
</head>
<body>
<div id="site-header"></div>

<!-- PASSWORD GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="4" y="9" width="12" height="9" rx="2" stroke="#00E5FF" stroke-width="1.5"/>
        <path d="M7 9V6a3 3 0 016 0v3" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="gate-title">Teacher Schedule</div>
    <div class="gate-sub">This page is for facilitators only. Enter the password to continue.</div>
    <input class="gate-input" id="gate-input" type="password" placeholder="Enter password" autocomplete="off"/>
    <button class="gate-btn" id="gate-btn">Unlock</button>
    <div class="gate-error" id="gate-error"></div>
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="page-content" id="page-content">
<main class="page-body">

  <a class="back-link" href="/teachers.html">&larr; Back to Teacher Resources</a>

  <!-- DAY NAVIGATOR STRIP -->
  <div class="nav-strip">
    <div class="nav-pills" id="nav-pills"></div>
    <div class="nav-badge">Pilot</div>
  </div>

  <!-- SELECTED DAY DETAIL -->
  <div id="day-detail"></div>

</main>
</div>

<script src="/config.js"></script>
<script src="/site.js"></script>
<script src="/days.js"></script>
<script>
renderHeader('teachers');

// ── Password gate ─────────────────────────────────────────────
const PASSWORD = CONFIG.teacherPassword;
const SESSION_KEY = 'va_teacher_auth';
const gate = document.getElementById('gate');
const content = document.getElementById('page-content');
const gateInput = document.getElementById('gate-input');
const gateBtn = document.getElementById('gate-btn');
const gateError = document.getElementById('gate-error');

function unlock() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    gate.style.display = 'none';
    content.classList.add('unlocked');
    return;
  }
  if (gateInput.value === PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    gate.style.display = 'none';
    content.classList.add('unlocked');
    initSchedule();
  } else {
    gateError.textContent = 'Incorrect password.';
    gateInput.value = '';
    gateInput.focus();
    gateInput.style.borderColor = '#FF6B6B';
    setTimeout(() => { gateInput.style.borderColor = ''; }, 1200);
  }
}
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  gate.style.display = 'none';
  content.classList.add('unlocked');
}
gateBtn.addEventListener('click', unlock);
gateInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// ── Build & render ────────────────────────────────────────────
const WEEK_NAMES = {
  1: 'Week 1 · Play Lab + Boot Camp',
  2: 'Week 2 · Season 1',
  3: 'Week 3 · Season 2 + Commissioner',
  4: 'Week 4 · Championship',
};

function getDefaultDay() {
  // URL hash takes precedence
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20) return hashDay;

  // Otherwise, today's camp day if within the range
  try {
    const dates = buildCampDates();
    const tz = (CONFIG && CONFIG.timezone) || 'America/New_York';
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: tz });
    for (let i = 0; i < dates.length; i++) {
      if (dates[i].toISOString().slice(0, 10) === todayStr) return i + 1;
    }
  } catch(e) {}
  return 1;
}

function renderPills(selectedDay) {
  const pills = document.getElementById('nav-pills');
  const nodes = [];
  for (let i = 1; i <= 20; i++) {
    nodes.push(
      `<a href="#day-${i}" class="nav-pill${i === selectedDay ? ' active' : ''}" onclick="selectDay(${i});return false;">${i}</a>`
    );
    // Separator dots between 5|6, 10|11, 15|16
    if (i === 5 || i === 10 || i === 15) {
      nodes.push('<div class="nav-pill-sep"></div>');
    }
  }
  pills.innerHTML = nodes.join('');
}

function renderDay(dayNum) {
  const d = DAYS.find(x => x.day === dayNum);
  const out = document.getElementById('day-detail');
  if (!d) {
    out.innerHTML = `<p style="color:var(--slate);">Day ${dayNum} not found.</p>`;
    return;
  }

  let weekday = '';
  try {
    const dates = buildCampDates();
    weekday = campDayWeekday(dates, dayNum);
  } catch(e) {}

  // BIG MATH IDEA + VOCABULARY cards are optional — show only if present on the day object
  const bigMathHtml = d.bigMathIdea ? `
    <div class="idea-card">
      <div class="idea-label">Big Math Idea</div>
      <div class="idea-text">${d.bigMathIdea}</div>
    </div>` : '';
  const vocabHtml = d.vocabulary ? `
    <div class="idea-card vocab">
      <div class="idea-label">Vocabulary</div>
      <div class="idea-text">${d.vocabulary}</div>
    </div>` : '';

  // URL fields (script/worksheet/webpage/template) live directly on each
  // activity in days.js — that file is the single source of truth.
  const actRows = (d.activities || []).map(a => {
    const linkPills = [];
    if (a.script)    linkPills.push(`<a class="tact-link"           href="${a.script}"    target="_blank" rel="noopener">📄 Script</a>`);
    if (a.worksheet) linkPills.push(`<a class="tact-link worksheet" href="${a.worksheet}" target="_blank" rel="noopener">📋 Worksheet</a>`);
    if (a.webpage)   linkPills.push(`<a class="tact-link webpage"   href="${a.webpage}"   target="_blank" rel="noopener">🔗 Page</a>`);
    if (a.template)  linkPills.push(`<a class="tact-link template"  href="${a.template}"  target="_blank" rel="noopener">📐 Template</a>`);
    if (a.makecode)  linkPills.push(`<a class="tact-link makecode"  href="${a.makecode}"  target="_blank" rel="noopener">🤖 MakeCode</a>`);
    return `<div class="tact-row">
      <div class="tact-mins">${a.mins}m</div>
      <div class="tact-body">
        <div class="tact-name">${a.name}</div>
        <div class="tact-block">${(a.block || '').replace(/\\/g, '')}</div>
        ${(a.facilitatorDescription || a.description) ? `<div class="tact-desc">${a.facilitatorDescription || a.description}</div>` : ''}
        ${linkPills.length ? `<div class="tact-links">${linkPills.join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const endsHtml = d.ends ? `
    <div class="tends-box">
      <div class="tends-label">ENDS closing ritual</div>
      <div class="tends-text">${d.ends.replace(/\s*\|\s*$/, '')}</div>
    </div>` : '';

  const riskHtml = d.facilitatorRisk ? `
    <div class="trisk-box">
      <div class="trisk-label">Highest-risk facilitation moment</div>
      <div class="trisk-text">${d.facilitatorRisk.risk}</div>
      <div class="trisk-say-label">Say:</div>
      <div class="trisk-say">${d.facilitatorRisk.say.replace(/\s*\|\s*$/, '')}</div>
    </div>` : '';

  const funHtml = d.funElement ? `
    <div class="tfun-box">
      <div class="tfun-label">Fun element</div>
      <div class="tfun-text">${d.funElement}</div>
    </div>` : '';

  const loHtml = d.los ? `
    <div class="tlo-box">
      <div class="tlo-label">Learning objectives</div>
      <div class="tlo-text">${d.los.split(/[#*+=-]{3,}/)[0].trim()}</div>
    </div>` : '';

  const prev = dayNum > 1 ? `<a href="#day-${dayNum-1}" onclick="selectDay(${dayNum-1});return false;">&larr; Day ${dayNum-1}</a>` : '<a class="disabled">&larr; Day</a>';
  const next = dayNum < 20 ? `<a href="#day-${dayNum+1}" onclick="selectDay(${dayNum+1});return false;">Day ${dayNum+1} &rarr;</a>` : '<a class="disabled">Day &rarr;</a>';

  out.innerHTML = `
    <div class="day-header">
      <div class="day-week-label">${WEEK_NAMES[d.week] || ('Week ' + d.week)}</div>
      <div class="day-number">Day ${d.day}</div>
      <div class="day-theme">${d.theme || ''}</div>
      <div class="day-weekday">${weekday}</div>
    </div>

    ${bigMathHtml}
    ${vocabHtml}

    <div class="schedule-label">Today's schedule</div>
    ${actRows}
    ${endsHtml}
    ${riskHtml}
    ${funHtml}
    ${loHtml}

    <div class="day-footer-nav">${prev}${next}</div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectDay(n) {
  if (n < 1 || n > 20) return;
  location.hash = 'day-' + n;
  renderPills(n);
  renderDay(n);
}

function initSchedule() {
  const day = getDefaultDay();
  renderPills(day);
  renderDay(day);
}

// Re-render on hash change (back/forward buttons)
window.addEventListener('hashchange', () => {
  const hashDay = parseInt((location.hash || '').replace('#day-', ''), 10);
  if (hashDay >= 1 && hashDay <= 20) {
    renderPills(hashDay);
    renderDay(hashDay);
  }
});

// Init — but only if unlocked
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  initSchedule();
}
</script>
</body>
</html>
