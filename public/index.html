<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Arena — Schedule</title>
<link rel="stylesheet" href="/style.css">
<style>
.week-section{margin-bottom:36px;}
.week-heading{font-size:18px;font-weight:800;color:var(--white);margin-bottom:4px;}
.week-subtitle{font-size:14px;color:var(--text-muted);margin-bottom:14px;}
.days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.day-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:10px;padding:16px 12px;text-decoration:none;color:inherit;display:block;transition:border-color .15s,box-shadow .15s;}
.day-card:hover{border-color:var(--teal);box-shadow:0 2px 8px rgba(0,120,153,.1);}
.dc-num{font-size:22px;font-weight:800;color:var(--white);margin-bottom:2px;}
.dc-day{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.dc-theme{font-size:13px;color:var(--text-muted);line-height:1.4;font-weight:500;}
.dc-acts{font-size:12px;color:var(--teal);margin-top:6px;font-weight:600;}
</style>
</head>
<body>
<div id="site-header"></div>

<main class="page-body">
  <div class="section-label">Select a day</div>
  <div id="schedule-grid">
    <p style="color:var(--text-muted);font-size:16px;">Loading schedule...</p>
  </div>
</main>

<script src="/site.js"></script>
<script src="/days.js"></script>
<script>
renderHeader('today');

const weeks = [
  { num: 1, name: 'Week 1: Play Lab + Boot Camp' },
  { num: 2, name: 'Week 2: Season 1' },
  { num: 3, name: 'Week 3: Season 2 + Commissioner' },
  { num: 4, name: 'Week 4: Championship' },
];

const grid = document.getElementById('schedule-grid');
grid.innerHTML = weeks.map(w => {
  const days = DAYS.filter(d => d.week === w.num);
  const cards = days.map(d => {
    const actCount = d.activities ? d.activities.length : 0;
    return `
      <a class="day-card" href="/day.html?day=${d.day}">
        <div class="dc-num">${d.day}</div>
        <div class="dc-day">${d.weekday}</div>
        <div class="dc-theme">${d.theme || 'No theme'}</div>
        ${actCount ? `<div class="dc-acts">${actCount} activities</div>` : ''}
      </a>`;
  }).join('');

  return `
    <div class="week-section">
      <div class="week-heading">${w.name}</div>
      <div class="days-grid">${cards}</div>
    </div>`;
}).join('');
</script>
</body>
</html>
